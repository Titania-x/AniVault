<!DOCTYPE html>
<html>
<head>
  <title>AniVault</title>
  <style>
    body { font-family: Arial; background:#0f0f0f; color:white; margin:0; }
    header { padding:20px; background:#1c1c1c; text-align:center; }
    button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
    .post-box { max-width:500px; margin:20px auto; display:flex; flex-direction:column; gap:10px; }
    input, textarea { padding:10px; border-radius:8px; border:none; }
    .post { background:#1c1c1c; margin:10px auto; max-width:500px; padding:15px; border-radius:10px; }
    img { width:100%; border-radius:10px; }
  </style>
</head>
<body>

<header>
  <h1>AniVault</h1>
  <button onclick="login()">Login with Google</button>
</header>

<div id="app" style="display:none;">

  <div class="post-box">
    <input id="image" placeholder="Image URL">
    <textarea id="caption" placeholder="Caption"></textarea>
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;

/* LOGIN */
window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  user = result.user;

  document.getElementById("app").style.display = "block";
  loadPosts();
};

/* CREATE POST */
window.post = async () => {
  const image = document.getElementById("image").value;
  const caption = document.getElementById("caption").value;

  await addDoc(collection(db, "posts"), {
    name: user.displayName,
    image,
    caption,
    likes: 0,
    time: Date.now()
  });

  loadPosts();
};

/* LOAD POSTS */
async function loadPosts() {
  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  const snap = await getDocs(q);

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();

    feed.innerHTML += `
      <div class="post">
        <h3>${p.name}</h3>
        <img src="${p.image}">
        <p>${p.caption}</p>
        <p>❤️ ${p.likes}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
