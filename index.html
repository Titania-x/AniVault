<!DOCTYPE html>
<html>
<head>
  <title>AniVault</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1c1c1c;
    }

    .post-box {
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, textarea {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .post {
      background: #1c1c1c;
      width: 90%;
      max-width: 500px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
    }

    .post img {
      width: 100%;
      border-radius: 10px;
    }

    .like-btn {
      margin-top: 10px;
      background: #5865f2;
    }
  </style>
</head>

<body>

<header>
  <h1>AniVault</h1>
  <p>Anime Collectors Social Feed</p>
</header>

<div class="post-box">
  <input type="text" id="username" placeholder="Your Name">
  <input type="text" id="image" placeholder="Image URL (figure/card)">
  <textarea id="caption" placeholder="Describe your collectible..."></textarea>
  <button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

<script>
let posts = [];

function addPost() {
  const username = document.getElementById("username").value;
  const image = document.getElementById("image").value;
  const caption = document.getElementById("caption").value;

  if (!username || !image || !caption) {
    alert("Please fill all fields");
    return;
  }

  posts.unshift({
    username,
    image,
    caption,
    likes: 0
  });

  renderPosts();

  document.getElementById("image").value = "";
  document.getElementById("caption").value = "";
}

function likePost(index) {
  posts[index].likes++;
  renderPosts();
}

function renderPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((post, index) => {
    feed.innerHTML += `
      <div class="post">
        <h3>${post.username}</h3>
        <img src="${post.image}">
        <p>${post.caption}</p>

        <div>❤️ ${post.likes}</div>

        <button class="like-btn" onclick="likePost(${index})">
          Like
        </button>
      </div>
    `;
  });
}
</script>

</body>
</html>
